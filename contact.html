<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Get in Touch</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1b263b;
    --ink-deep:#111826;
    --parchment:#f3ead9;
    --parchment-dark:#e8dcc4;
    --stamp-red:#a8362f;
    --gold:#bd9a3f;
    --charcoal:#2b2620;
    --line:#c9b98f;
  }

  *{box-sizing:border-box;}

  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(circle at 20% 20%, rgba(189,154,63,0.08), transparent 45%),
      radial-gradient(circle at 80% 85%, rgba(168,54,47,0.10), transparent 40%),
      var(--ink);
    font-family:'Source Serif 4', serif;
    color:var(--charcoal);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:48px 20px;
  }

  .letter-wrap{
    width:100%;
    max-width:620px;
    position:relative;
  }

  .masthead{
    text-align:center;
    color:var(--parchment);
    margin-bottom:28px;
  }

  .masthead .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    letter-spacing:0.35em;
    text-transform:uppercase;
    color:var(--gold);
    margin-bottom:10px;
  }

  .masthead h1{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:clamp(32px, 6vw, 48px);
    margin:0 0 10px;
  }

  .masthead p{
    font-style:italic;
    font-size:16px;
    color:#cfd6e4;
    max-width:420px;
    margin:0 auto;
  }

  .envelope{
    background:var(--parchment);
    border-radius:4px;
    position:relative;
    padding:52px 44px 44px;
    box-shadow:
      0 30px 60px -20px rgba(0,0,0,0.55),
      0 0 0 1px rgba(0,0,0,0.04);
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 27px, rgba(0,0,0,0.025) 28px);
  }

  .envelope::before{
    content:"";
    position:absolute;
    top:0; left:0; right:0;
    height:14px;
    background:repeating-linear-gradient(-45deg, var(--stamp-red) 0 10px, var(--gold) 10px 20px);
    border-radius:4px 4px 0 0;
    opacity:0.85;
  }

  .stamp{
    position:absolute;
    top:26px;
    right:34px;
    width:64px;
    height:78px;
    border:2px dashed var(--gold);
    border-radius:2px;
    display:flex;
    align-items:center;
    justify-content:center;
    transform:rotate(4deg);
    background:rgba(189,154,63,0.06);
  }

  .stamp svg{width:34px;height:34px;fill:var(--gold);}

  .field-label{
    display:block;
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:#6b5f4a;
    margin-bottom:8px;
  }

  .field-label .req{ color:var(--stamp-red); margin-left:3px; }

  .field{
    margin-bottom:26px;
  }

  input, textarea{
    width:100%;
    background:transparent;
    border:none;
    border-bottom:1.5px solid var(--line);
    font-family:'Source Serif 4', serif;
    font-size:17px;
    color:var(--charcoal);
    padding:8px 2px 10px;
    outline:none;
    transition:border-color 0.25s ease, transform 0.25s ease;
  }

  textarea{ resize:vertical; min-height:96px; line-height:1.5; }

  input::placeholder, textarea::placeholder{
    color:#a89f8c;
    font-style:italic;
  }

  input:focus, textarea:focus{
    border-bottom-color:var(--stamp-red);
  }

  .two-col{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:0 28px;
  }

  @media (max-width:520px){
    .two-col{ grid-template-columns:1fr; }
    .envelope{ padding:44px 26px 34px; }
  }

  .submit-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-top:38px;
    padding-top:22px;
    border-top:1px dashed var(--line);
  }

  .sig{
    font-family:'Fraunces', serif;
    font-style:italic;
    font-size:14px;
    color:#8a7d63;
  }

  button{
    position:relative;
    font-family:'IBM Plex Mono', monospace;
    letter-spacing:0.12em;
    text-transform:uppercase;
    font-size:13px;
    color:var(--parchment);
    background:var(--ink);
    border:none;
    padding:14px 28px;
    border-radius:2px;
    cursor:pointer;
    overflow:hidden;
    transition:transform 0.15s ease, background 0.2s ease;
  }

  button:hover{ background:var(--ink-deep); }
  button:active{ transform:scale(0.96); }

  button .postmark{
    position:absolute;
    inset:0;
    border-radius:50%;
    background:var(--stamp-red);
    transform:scale(0);
    opacity:0.9;
  }

  button.stamping .postmark{
    animation:stampDown 0.5s ease forwards;
  }

  @keyframes stampDown{
    0%{ transform:scale(0); border-radius:50%; }
    60%{ transform:scale(2.2); border-radius:50%; }
    100%{ transform:scale(2.6); border-radius:0; opacity:0; }
  }

  .status{
    margin-top:16px;
    font-family:'IBM Plex Mono', monospace;
    font-size:12.5px;
    letter-spacing:0.03em;
    min-height:18px;
  }

  .status.ok{ color:#2f6b3a; }
  .status.err{ color:var(--stamp-red); }

  /* honeypot */
  .hp{ position:absolute; left:-9999px; opacity:0; height:0; }

  @media (prefers-reduced-motion: reduce){
    button.stamping .postmark{ animation:none; }
  }
</style>
</head>
<body>

<div class="letter-wrap">
  <div class="masthead">
    <div class="eyebrow">Correspondence</div>
    <h1>Write to Me</h1>
    <p>Thoughts, questions, or just a hello — every letter gets read, and most get answered.</p>
  </div>

  <div class="envelope">
    <div class="stamp" aria-hidden="true">
      <svg viewBox="0 0 24 24"><path d="M12 2 3 7v10l9 5 9-5V7l-9-5zm0 2.2 7 3.9v.1l-7 3.9-7-3.9v-.1l7-3.9zM5 9.9l6 3.4v6.4l-6-3.3V9.9zm14 0v6.5l-6 3.3v-6.4l6-3.4z"/></svg>
    </div>

    <form id="letterForm">
      <input type="checkbox" name="botcheck" class="hp" tabindex="-1" autocomplete="off">

      <div class="field">
        <label class="field-label" for="name">Your Name<span class="req">*</span></label>
        <input type="text" id="name" name="name" placeholder="Jane Doe" required>
      </div>

      <div class="two-col">
        <div class="field">
          <label class="field-label" for="email">Your Email<span class="req">*</span></label>
          <input type="email" id="email" name="email" placeholder="jane@example.com" required>
        </div>
        <div class="field">
          <label class="field-label" for="address">Your Address</label>
          <input type="text" id="address" name="address" placeholder="Optional">
        </div>
      </div>

      <div class="field">
        <label class="field-label" for="message">Your Message<span class="req">*</span></label>
        <textarea id="message" name="message" placeholder="What's on your mind?" required></textarea>
      </div>

      <div class="submit-row">
        <span class="sig">— yours truly</span>
        <button type="submit" id="sendBtn">
          <span class="postmark"></span>
          <span class="btnText">Send Letter</span>
        </button>
      </div>

      <div class="status" id="statusMsg"></div>
    </form>
  </div>
</div>

<script>
  const form = document.getElementById('letterForm');
  const btn = document.getElementById('sendBtn');
  const btnText = btn.querySelector('.btnText');
  const statusMsg = document.getElementById('statusMsg');

  form.addEventListener('submit', async function (e) {
    e.preventDefault();

    btn.classList.add('stamping');
    btn.disabled = true;
    btnText.textContent = 'Sending…';
    statusMsg.textContent = '';
    statusMsg.className = 'status';

    const formData = new FormData(form);
    formData.append('access_key', 'XXXX-XXXX-XXXX'); // <-- replace with your Web3Forms key
    formData.append('subject', 'New message from your blog contact form');

    try {
      const res = await fetch('https://api.web3forms.com/submit', {
        method: 'POST',
        body: formData
      });
      const result = await res.json();

      if (result.success) {
        statusMsg.textContent = 'Delivered. Thank you for writing.';
        statusMsg.classList.add('ok');
        form.reset();
      } else {
        statusMsg.textContent = 'The letter did not go through. Please try again.';
        statusMsg.classList.add('err');
      }
    } catch (err) {
      statusMsg.textContent = 'Something went wrong. Check your connection and try again.';
      statusMsg.classList.add('err');
    } finally {
      btn.disabled = false;
      btnText.textContent = 'Send Letter';
      setTimeout(() => btn.classList.remove('stamping'), 600);
    }
  });
</script>

</body>
</html>
